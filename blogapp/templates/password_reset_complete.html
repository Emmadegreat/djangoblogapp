{% extends 'base.html' %}

{% block content %}

    <section class="min-h-screen flex items-center justify-center px-4 py-10 mt-[60px]">

        <div class="w-full max-w-[480px] rounded-md border-[1px] border-green-700 shadow-sm p-8 text-center">

            <!-- Success Icon -->
            <p class="text-[48px] mb-4">✅</p>

            <!-- Header -->
            <h2 class="text-[24px] font-semibold text-green-700 mb-2">Password Reset Successful</h2>
            <p class="text-gray-500 text-sm mb-8">Your password has been set successfully. You can now log in with your new password.</p>

            <!-- Login Button -->
            <a href="{% url 'login' %}" 
            class="inline-block w-full py-2 px-6 rounded-md bg-green-700 text-white text-center hover:bg-green-800 transition-colors duration-200 font-medium">
                Login to Your Account
            </a>

        </div>

    </section>

{% endblock content %}
